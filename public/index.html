<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUE AI Outreach Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 40px; background: #f4f7f6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 30px 0; }
        .stat-card { background: #fff; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat-value { font-size: 32px; font-weight: bold; color: #3498db; }
        .stat-label { font-size: 14px; color: #7f8c8d; text-transform: uppercase; margin-top: 5px; }
        .chart-container { margin-top: 40px; height: 300px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CUE AI Outreach Performance</h1>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalSent">-</div>
                <div class="stat-label">Total Sent</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accepted">-</div>
                <div class="stat-label">Accepted</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="replied">-</div>
                <div class="stat-label">Replied</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="interested">-</div>
                <div class="stat-label">Interested</div>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="conversionChart"></canvas>
        </div>
    </div>

    <script>
        async function loadStats() {
            const response = await fetch('/api/stats');
            const data = await response.json();
            
            document.getElementById('totalSent').textContent = data.totalSent;
            document.getElementById('accepted').textContent = data.accepted;
            document.getElementById('replied').textContent = data.replied;
            document.getElementById('interested').textContent = data.interested;

            const ctx = document.getElementById('conversionChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Sent', 'Accepted', 'Replied', 'Interested'],
                    datasets: [{
                        label: 'Profiles',
                        data: [data.totalSent, data.accepted, data.replied, data.interested],
                        backgroundColor: ['#3498db', '#2ecc71', '#f1c40f', '#e74c3c']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
        loadStats();
    </script>
</body>
</html>
